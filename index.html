const loadRecentCheckins = async ({ silent = false } = {}) => {

  }

  // Only load recent check-ins when needed (e.g. pool detail view)
  const sinceIso = new Date(
    Date.now() - CHECKIN_WINDOW_MINUTES * 60 * 1000
  ).toISOString();

  const { data, error } = await window.supa
    .from("checkins")
    .select("id, created_at, pool_id, lane_type, lane, delta")
    .gte("created_at", sinceIso)
    .order("created_at", { ascending: false })
    .limit(50);

  if (error) {
    console.error("loadRecentCheckins error:", error);
    setCheckinsError(error.message);
    setRecentCheckins([]);
  } else {
    const normalized = (data ?? []).map((row) => ({
      ...row,
      lane: row.lane_type || row.lane,
    }));
    setCheckinsError(null);
    setRecentCheckins(normalized);
  }

  if (!silent) {

  }

      const normalizeLaneId = (laneType) => {
        if (!laneType) return "";
        const value = String(laneType).toLowerCase();
        if (value === "fast" || value === "medium" || value === "slow") return value;
        if (value.includes("fast")) return "fast";
        if (value.includes("medium")) return "medium";
        if (value.includes("slow")) return "slow";
        return "";
      };

      const loadBusynessData = async ({ silent = false } = {}) => {
        if (!silent) {
          setBusynessLoading(true);
        }

        const timeoutPromise = new Promise((resolve) => {
          window.setTimeout(() => resolve({ timedOut: true }), 5000);
        });

        try {
          const queryPromise = window.supa
            .from("checkins")
            .select("pool_id, lane_type")
            .gt("expires_at", new Date().toISOString());

          const result = await Promise.race([queryPromise, timeoutPromise]);

          if (result?.timedOut) {
            setBusynessError("timeout");
            setPoolData({});
            return;
          }

          if (result.error) throw result.error;

          const agg = {};
          for (const row of result.data || []) {
            const poolId = row.pool_id;
            const laneId = normalizeLaneId(row.lane_type);
            if (!poolId || !laneId) continue;
            if (!agg[poolId]) agg[poolId] = { lanes: {}, totalUpdates: 0, lastUpdate: null };
            if (!agg[poolId].lanes[laneId]) agg[poolId].lanes[laneId] = { checkInCount: 0, lastUpdate: null };

            agg[poolId].lanes[laneId].checkInCount += 1;
            agg[poolId].totalUpdates += 1;
            agg[poolId].lastUpdate = new Date().toISOString();
          }

          setBusynessError(null);
          setPoolData(agg);
        } catch (e) {
          console.error("loadBusynessData error:", e);
          setBusynessError("error");
          setPoolData({});
        } finally {
          if (!silent) {
            setBusynessLoading(false);
          }
        }
      };

      useEffect(() => {
        loadBusynessData();
        const t = setInterval(() => {
          loadBusynessData({ silent: true });
        }, 10000);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        if (!viewingPool) return;
        loadRecentCheckins();

        const t = setInterval(() => {

          setShowAuthModal(false);
        });

        return () => {
          mounted = false;
          listener?.subscription?.unsubscribe();
        };
      }, []);
